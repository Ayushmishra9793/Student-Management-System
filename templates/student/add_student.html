            <div>
                <lable >Student Profile</lable>
                <input type="file" name="input_profile"  >
            </div>
          
            <!-- Name -->
            <div>
                <label class="block text-gray-700 font-medium mb-1">
                    Full Name
                </label>                                                                               <!-- name = name/email  => this attributes helps in backend or views -->
                <input type="text" name="input_name" placeholder="Enter student name"                  
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                    required>
            </div>

            <!-- Email -->
            <div>
                <label class="block text-gray-700 font-medium mb-1">
                    Email Address
                </label>
                <input type="email" name="input_email" placeholder="Enter email"
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                    required>
            </div>

            <!-- Phone -->
            <div>
                <label class="block text-gray-700 font-medium mb-1">
                    Phone Number
                </label>
                <input type="tel" name="input_phone_number" placeholder="Enter phone number"
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                    required>
            </div>

            <!-- Buttons -->
            <div class="flex justify-between items-center pt-4">
                <a href="{% url 'student_home' %}" 
                   class="text-gray-600 hover:text-gray-800">
                    ← Back
                </a>

                <button type="submit"
                    class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-lg shadow">
                    Save Student
                </button>
            </div>

        </form>

    </div>

</body>
</html>
