<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Student</title>

        <h2 class="text-2xl font-bold text-center text-yellow-600 mb-6">
            Update Student
        </h2>

            {% csrf_token %}

            <div class="text-center">

                <label class="block font-medium mb-2">Student Profile</label>

                {% if student.student_profile %}

                {% endif %}

                <input type="file" name="student_profile" class="mx-auto block text-sm text-center">

            </div>

            <!-- Name -->
            <div>
                <label class="block text-gray-700 font-medium mb-1">
                    Full Name
                </label>
                <input 
                    type="text" 
                    name="name"
                    value="{{ student.name}}"
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400"
                    required>
            </div>

            <!-- Email -->
            <div>
                <label class="block text-gray-700 font-medium mb-1">
                    Email Address
                </label>
                <input 
                    type="email" 
                    name="email"
                    value="{{student.email}}"
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400"
                    required>
            </div>

            <!-- Phone -->
            <div>
                <label class="block text-gray-700 font-medium mb-1">
                    Phone Number
                </label>
                <input 
                    type="tel" 
                    name="phone"
                    value="{{student.phone_number}}"
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400"
                    required>
            </div>

            <!-- Buttons -->
            <div class="flex justify-between items-center pt-4">

                <a href="{% url 'student_home' %}" 
                   class="text-gray-600 hover:text-gray-800">
                    ← Back
                </a>

                <button 
                    type="submit"
                    class="bg-yellow-500 hover:bg-yellow-600 text-white px-6 py-2 rounded-lg shadow">
                    Update Student
                </button>

            </div>

        </form>

    </div>

</body>
</html>
