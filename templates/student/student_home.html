<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student CRUD Cards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Header -->
    <div class="bg-blue-600 text-white p-4 shadow-md">
        <h1 class="text-2xl font-bold text-center">Student Management</h1>
    </div>

    <!-- Create Button -->
    <div class="max-w-6xl mx-auto mt-6 px-4">
        <a  href="{% url 'add_student' %}" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg shadow">
            + Create Student
        </a>
    </div>

    <!-- Cards Section -->
    <div class="max-w-6xl mx-auto mt-6 grid gap-6 grid-cols-1 sm:grid-cols-2 md:grid-cols-3 px-4">

        <!-- for loop  -->

        {% for student in student_data %}

        

        <!-- Student Card 1 -->
        <div class="bg-white rounded-xl shadow-md p-6 hover:shadow-xl transition duration-300">
            <!-- <h2 class="text-xl font-semibold mb-2">{{name}}</h2>   -->
            
            <!-- views.py se data aa rha hai html me {data me dic hai variable -> name , age } {{name}} variable jo ki data me hai ab use ker rhe usse   its called JINJA 
                 html me varibles(key) hi chahiye hote hai key ke bisis per value show karega    -->
             
            <h2 class="text-xl font-semibold mb-2">{{student.name}}</h2>  
            <p class="text-gray-600"><strong>Email: </strong> {{student.email}}</p>
            <p class="text-gray-600 mb-4"><strong>Phone:</strong> {{student.phone_number}} </p>

            {% comment %}
            <!--  hum for loop laga ke data base se exact value yaha le ker aa rhe hai {{loop variable.model property/attribute}} -->

            {% endcomment %}

            <div class="flex justify-between">
                <button class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded-md">View</button>
                <button class="bg-yellow-500 hover:bg-yellow-600 text-white px-3 py-1 rounded-md">Edit</button>
                <button class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-md">Delete</button>
            </div>
        </div>

    {% endfor %}    
        
    </div>

</body>
</html>

{% comment %}
<!-- NOTE:   
 
      In for loop: 
                    {% for student in student_data %}

       student => loop variable , student_data => query set (collection of objects) -> ye vo data jo views.py se aa rh hai 
   
       for logic execution : {% logic %} 
       for variables : {{ variables }}                  -->

       {% endcomment %}
